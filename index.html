<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Line Follower Simulator - Interactive Playground</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  </head>
  <body>
    <div class="split-pane">
      <div id="editor-panel">
        <div id="editor-toolbar">
          <!-- Primary actions -->
          <button
            onclick="runCode(event)"
            class="btn-primary"
            title="Compile and run (Ctrl+Enter)"
          >
            ▶ Run
          </button>
          <button onclick="shareToURL()" class="btn-icon" title="Copy shareable URL">
            🔗
          </button>

          <div class="toolbar-separator"></div>

          <!-- Map selector -->
          <select id="map-selector" onchange="loadSelectedMap()" title="Select course map">
            <option value="novice">Novice Course</option>
          </select>
          <button onclick="openCustomMapModal()" class="btn-icon" title="Add custom map">+</button>

          <div class="toolbar-separator"></div>

          <!-- Example selector -->
          <select id="example-selector" onchange="loadSelectedExample()" title="Load example controller">
            <option value="">Load Example...</option>
          </select>

          <div class="toolbar-separator"></div>

          <!-- Projects -->
          <button onclick="openProjectModal()" title="Manage projects">
            Projects
          </button>
        </div>
        <div id="editor"></div>
        <div id="editor-status">
          <span id="compile-status">Ready</span>
          <span id="editor-info">JavaScript</span>
        </div>
      </div>

      <div class="resizer" id="resizer"></div>

      <div id="canvas-panel">
        <div id="controls-panel" class="floating-panel collapsible">
          <div class="panel-header" onclick="togglePanel()">
            <span>Status</span>
            <span id="panel-toggle">−</span>
          </div>
          <div class="panel-content">
            <div class="control-row">
              <button onclick="event.stopPropagation(); runCode(event)" title="Start contest (R)">
                ▶ Run
              </button>
              <button onclick="contestStop()" title="Stop contest (Space)">
                ⏸ Stop
              </button>
              <button onclick="resetRobot()" title="Reset robot to start">
                ↻ Reset
              </button>
            </div>

            <!-- Physics frequency control -->
            <div class="control-row">
              <label for="physics-hz-slider">Physics:</label>
              <input
                type="range"
                id="physics-hz-slider"
                min="10"
                max="1000"
                value="60"
                step="10"
                oninput="setPhysicsFrequency(this.value)"
                title="Physics update frequency (10-1000 Hz)"
              />
              <span id="physics-hz-display">60 Hz</span>
            </div>

            <div id="status-bar">
              <span id="time">00:00.000</span>
              <span id="distance">0.0"</span>
              <span id="fps">60 FPS</span>
            </div>

            <!-- Robot state indicator -->
            <div id="robot-state" class="state-indicator">
              <span id="state-text">Ready</span>
              <span id="state-icon" class="state-ok">●</span>
            </div>

            <!-- Live charts -->
            <div id="live-charts" style="margin-top: 8px;">
              <div class="chart-container">
                <div class="chart-label">Speed (in/s)</div>
                <canvas id="chart-speed" width="240" height="30"></canvas>
              </div>
              <div class="chart-container">
                <div class="chart-label">Error</div>
                <canvas id="chart-error" width="240" height="30"></canvas>
              </div>
              <div class="chart-container">
                <div class="chart-label">Turn Rate (°/s)</div>
                <canvas id="chart-turnrate" width="240" height="30"></canvas>
              </div>
            </div>

            <div
              style="
                margin-top: 12px;
                padding-top: 12px;
                border-top: 1px solid var(--accent-primary);
              "
            >
              <div class="score-item total">
                <span class="score-label">Score:</span>
                <span class="score-value" id="score-total">0.0</span>
              </div>
              <div class="score-breakdown">
                <div class="score-item" title="Lower deviation from line = higher score">
                  <span class="score-label">Accuracy:</span>
                  <span class="score-value" id="score-accuracy">0.0</span>
                </div>
                <div class="score-item" title="Consistent speed = higher score">
                  <span class="score-label">Efficiency:</span>
                  <span class="score-value" id="score-efficiency">0.0</span>
                </div>
                <div class="score-item" title="Progress along track">
                  <span class="score-label">Complete:</span>
                  <span class="score-value" id="score-completion">0.0%</span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="footer">
          <a href="https://github.com/80avin/lf-simulator" target="_blank" rel="noopener noreferrer">
              <img src="https://img.shields.io/badge/github-lf--simulator-blue?logo=github" alt="View on GitHub repository">
          </a>
        </div>
      </div>
    </div>

    <!-- Custom Map Modal -->
    <div id="custom-map-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">📍 Add Custom Map</div>
        <div class="modal-body">
          <div class="form-group">
            <label>Map Name:</label>
            <input
              type="text"
              id="custom-map-name"
              placeholder="My Custom Course"
            />
          </div>

          <div class="form-group">
            <label>Image URL:</label>
            <input
              type="text"
              id="custom-map-url"
              placeholder="https://example.com/map.jpg"
            />
          </div>

          <div class="form-group">
            <label>OR Upload Image:</label>
            <input type="file" id="custom-map-file" accept="image/*" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>DPI (pixels/inch):</label>
              <input type="number" id="custom-map-dpi" value="64" min="1" />
            </div>
            <div class="form-group">
              <label>Course Length (inches):</label>
              <input type="number" id="custom-map-length" value="200" min="1" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Start X (inches):</label>
              <input type="number" id="custom-map-x" value="27" step="1" />
            </div>
            <div class="form-group">
              <label>Start Y (inches):</label>
              <input type="number" id="custom-map-y" value="12" step="1" />
            </div>
            <div class="form-group">
              <label>Start Heading (deg):</label>
              <input
                type="number"
                id="custom-map-heading"
                value="0"
                min="0"
                max="359"
              />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button onclick="closeCustomMapModal()">Cancel</button>
          <button onclick="saveCustomMap()">Add Map</button>
        </div>
      </div>
    </div>

    <!-- Projects Modal -->
    <div id="projects-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">📁 Manage Projects</div>
        <div class="modal-body">
          <div class="form-group">
            <label>Save Current Code:</label>
            <div class="form-row">
              <input
                type="text"
                id="project-name-modal"
                placeholder="Enter project name..."
                style="flex: 1;"
              />
              <button onclick="saveProjectFromModal()">💾 Save</button>
            </div>
          </div>

          <div class="form-group">
            <label>Saved Projects:</label>
            <select id="project-list-modal" size="8" style="width: 100%;">
              <option value="">No saved projects</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button onclick="deleteProjectFromModal()">🗑 Delete</button>
          <button onclick="loadProjectFromModal()">Load</button>
          <button onclick="closeProjectModal()">Close</button>
        </div>
      </div>
    </div>

    <script type="module" src="ui.js"></script>
  </body>
</html>
